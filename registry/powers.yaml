# powers.yaml -- power registry (rules-as-data, design doc B §4.2).
#
# Entry shape (frozen):
#   - id: <int>            numeric enum value -- append-only, NEVER renumbered
#     name: <SYMBOL>       generated enum symbol (PowerId::<SYMBOL>)
#     game_id: "<string>"  the game's POWER_ID string -- translator/oracle join key
#     type: BUFF|DEBUFF    AbstractPower.PowerType (Artifact/Sadistic debuff-gating,
#                          the APPLY_POWER interception, read this field)
#     stack: intensity|none  how a re-applied power combines (default: intensity ==
#                          additive amount stacking, AbstractPower.stackPower's
#                          this.amount += stackAmount; `none` == non-stacking marker
#                          for a later bespoke consumer). Optional (default intensity).
#     native: true         (optional) the power's hooks are handled by the native
#                          escape hatch (power_hooks.cpp dispatch_native_hook) rather
#                          than by a data-bound effect program -- for the irreducibly
#                          bespoke powers (guards, counters, interception, redirects).
#     hooks:               (optional) hook -> effect program bindings (B3.2). Each
#                          key is a Hook name (power_hooks.hpp); the value is a list
#                          of {op, target, amount[, power]} steps queued (addToBot)
#                          in list order when the hook fires. `target: SELF` means
#                          the power's OWNER; ALL_ENEMY/RANDOM_ENEMY fan out over the
#                          owner's enemies at execute time (interp.hpp). AMOUNT
#                          CONVENTION: `amount: 0` (or omitted) means "use the
#                          power's current stack amount" (PowerSlot.amount -- the
#                          usual stack-scaled effect: block N, draw N, damage N);
#                          a NON-zero amount is a literal (e.g. Combust's fixed
#                          1-HP loss). A `native:`
#                          power still LISTS the hooks it responds to here (with an
#                          empty program) so the framework knows which hooks to route
#                          to the native switch.
#     provenance: "<Class.method (File.java:line) -- read in full>"
#
# The framework (B3.2) dispatches these hooks through the pump in the frozen
# stage-a §5.2/§5.3/§5.4/§5.5 order (power_hooks.cpp). The three skeleton powers
# (Strength/Vulnerable/Weak) carry NO hook bindings: their behaviour is the DAMAGE-
# pipeline atDamageGive/atDamageReceive hooks, which stay native in interp.cpp
# (the damage pipeline is not routed through this data table -- it is float-exact
# and hot, stage-a §5.5). This domain also generates the PowerId enum + game_id
# table (unchanged).
#
# Ids pinned STRENGTH=1..WEAK=3 (skeleton, stage-a §9); the B3.2 framework powers
# are appended from 4 (append-only, design doc B §4.4) -- the hook plumbing the
# ~30 card-applied powers (scoping report §4) attach to. Each carries the (hook,
# program) or native binding the five §5.3-5.5 stress cases exercise; the cards
# that CREATE these powers, and the remaining powers, land with their batches
# (B3.3+).

- id: 1
  name: STRENGTH
  game_id: "Strength"
  type: BUFF
  provenance: "StrengthPower.atDamageGive (StrengthPower.java:92-98) -- damage + amount; POWER_ID (StrengthPower.java:21)"

- id: 2
  name: VULNERABLE
  game_id: "Vulnerable"
  type: DEBUFF
  provenance: "VulnerablePower.atDamageReceive (VulnerablePower.java:61-73) -- damage * 1.5f; POWER_ID (VulnerablePower.java:21)"

- id: 3
  name: WEAK
  game_id: "Weakened"
  type: DEBUFF
  provenance: "WeakPower.atDamageGive (WeakPower.java:61-70) -- damage * 0.75f; POWER_ID (WeakPower.java:21)"

# --- B3.2 framework powers (hook bindings for the §5.3-5.5 dispatch order) ----

- id: 4
  name: ARTIFACT
  game_id: "Artifact"
  type: BUFF
  native: true
  hooks:
    on_apply_power: []          # target-side DEBUFF nullify, consumed inside APPLY_POWER
  provenance: "ArtifactPower.onSpecificTrigger (ArtifactPower.java:34-44) -- decrement, remove at 0; the nullify + PowerType.DEBUFF check is ApplyPowerAction.update (ApplyPowerAction.java:131-138)"

- id: 5
  name: METALLICIZE
  game_id: "Metallicize"
  type: BUFF
  hooks:
    at_end_of_turn_pre_card:
      - {op: BLOCK, target: SELF, amount: 0}   # block = power amount
  provenance: "MetallicizePower.atEndOfTurnPreEndTurnCards (MetallicizePower.java:39-42) -- GainBlockAction(owner, amount); fires in AbstractRoom.applyEndOfTurnPreCardPowers (AbstractRoom.java:535-539), stage-a §5.4"

- id: 6
  name: FEEL_NO_PAIN
  game_id: "Feel No Pain"
  type: BUFF
  hooks:
    on_exhaust:
      - {op: BLOCK, target: SELF, amount: 0}   # block = power amount
  provenance: "FeelNoPainPower.onExhaust (FeelNoPainPower.java:36-39) -- GainBlockAction(owner, amount); fires in CardGroup.moveToExhaustPile (CardGroup.java:851-856), stage-a §5.5"

- id: 7
  name: DARK_EMBRACE
  game_id: "Dark Embrace"
  type: BUFF
  hooks:
    on_exhaust:
      - {op: DRAW, target: SELF, amount: 0}    # draw = power amount
  provenance: "DarkEmbracePower.onExhaust (DarkEmbracePower.java:36-41) -- DrawCardAction(owner, amount); fires in CardGroup.moveToExhaustPile (CardGroup.java:851-856), stage-a §5.5"

- id: 8
  name: COMBUST
  game_id: "Combust"
  type: BUFF
  hooks:
    at_end_of_turn:
      - {op: LOSE_HP, target: SELF, amount: 1}       # fixed hpLoss (base)
      - {op: DAMAGE, target: ALL_ENEMY, amount: 0}   # damage = power amount
  provenance: "CombustPower.atEndOfTurn (CombustPower.java:39-47) -- LoseHPAction(owner, hpLoss) then DamageAllEnemiesAction(amount, THORNS); fires via AbstractCreature.applyEndOfTurnTriggers (AbstractCreature.java:548-553). NOTE: the hpLoss ratchet (stackPower ++hpLoss) is a per-instance counter deferred to B3.7; the base program loses 1 HP."

- id: 9
  name: RUPTURE
  game_id: "Rupture"
  type: BUFF
  native: true
  hooks:
    was_hp_lost: []             # guarded: fires only for self-inflicted (card) HP loss
  provenance: "RupturePower.wasHPLost (RupturePower.java:60-66) -- if damageAmount>0 && info.owner==owner: addToTop ApplyPowerAction(Strength, amount). The info.owner==owner guard is the attribution (card HP loss, NOT unblocked enemy damage)."

- id: 10
  name: SADISTIC
  game_id: "Sadistic"
  type: BUFF
  native: true
  hooks:
    on_apply_power: []          # source-side: on applying a debuff, damage the target
  provenance: "SadisticPower.onApplyPower (SadisticPower.java:38-44) -- if power.type==DEBUFF && !Shackled && source==owner && target!=owner && !target.hasPower(Artifact): addToBot DamageAction(target, amount, THORNS); fires FIRST in ApplyPowerAction.update (ApplyPowerAction.java:106-109), before the Artifact nullify."

- id: 11
  name: CORRUPTION
  game_id: "Corruption"
  type: BUFF
  native: true
  hooks:
    on_use_card: []             # a played SKILL is redirected to exhaust
    on_card_draw: []            # a drawn SKILL costs 0 this turn
  provenance: "CorruptionPower.onUseCard (CorruptionPower.java:45-49) -- if card.type==SKILL: card.exhaustOnUseOnce=true; onCardDraw (CorruptionPower.java:38-43) -- if card.type==SKILL: card.setCostForTurn(0). Skills-cost-0 at play is AbstractPlayer.useCard's hasPower(Corruption) energy skip (AbstractPlayer.java:1378)."

- id: 12
  name: RAGE
  game_id: "Rage"
  type: BUFF
  hooks:
    on_play_card:
      - {op: BLOCK, target: SELF, amount: 0}   # block = power amount
  provenance: "RagePower.onUseCard (RagePower.java:41-47) -- if card.type==ATTACK: GainBlockAction(owner, amount). Bound to on_play_card here: our engine collapses the onPlayCard/onUseCard card-play cycles into one synchronous resolve_card_play (card_play.hpp HOOK-ORDER COLLAPSE), so both fire together; the attack-type guard is the power's concern, deferred to the B3.6 Rage card. Used as the §5.3 player-before-monster fan-out probe."

# --- B3.4 (Flex): temporary-Strength reversal power --------------------------

- id: 13
  name: LOSE_STRENGTH
  game_id: "Flex"
  type: DEBUFF
  native: true
  hooks:
    at_end_of_turn: []          # native: apply Strength -amount to owner, then self-remove
  provenance: "LoseStrengthPower.atEndOfTurn (LoseStrengthPower.java:40-44) -- addToBot ApplyPowerAction(owner, StrengthPower(owner,-amount)) then addToBot RemoveSpecificPowerAction(owner, \"Flex\"); constructor type DEBUFF, POWER_ID \"Flex\" (LoseStrengthPower.java:19,29). Native body (power_hooks.cpp): queues APPLY_POWER Strength -amount and REMOVE_POWER LoseStrength on the owner (both addToBot -> resolve after the power-list walk). The reversal makes Flex's +Strength last exactly one turn."

# --- potion-support-powers follow-up (discharges the B3.23/B3.24 deferrals) ---
# The power rows ~9 Ironclad potions and two common relics (Bronze Scales,
# Oddly Smooth Stone) needed. Each read in full from the decompiled Java before
# coding; ids append from 14 (B3.4 took 13). Consumers: Dexterity/Speed/Steroid/
# Regen/Liquid Bronze/Essence of Steel/Cultist potions + the two relics.

- id: 14
  name: DEXTERITY
  game_id: "Dexterity"
  type: BUFF
  # No hook bindings: like Strength/Vulnerable/Weak, Dexterity is a DAMAGE/BLOCK-
  # pipeline modifier, not a queued hook. DexterityPower.modifyBlock(+amount) is a
  # BLOCK-pipeline hook, applied natively in op_block (interp.cpp) to the OWNER's
  # block gain -- but ONLY for card block (AbstractCard.applyPowers runs modifyBlock);
  # power/relic/potion block calls GainBlockAction directly (no modifyBlock), so
  # those BLOCK items carry kBlockNoPowers and op_block skips the Dexterity add.
  # canGoNegative (a negative Dexterity reduces block, floored at 0); type flips to
  # DEBUFF for display when negative but the registry type is the BUFF identity the
  # Artifact/Sadistic interception reads.
  provenance: "DexterityPower.modifyBlock (DexterityPower.java:106-111) -- blockAmount + amount, floor 0; stackPower additive (:44-56); canGoNegative (:31); POWER_ID \"Dexterity\" (:14). No atEndOfTurn/hook body."

- id: 15
  name: LOSE_DEXTERITY
  game_id: "DexLoss"
  type: DEBUFF
  native: true
  hooks:
    at_end_of_turn: []          # native: apply Dexterity -amount to owner, then self-remove
  provenance: "LoseDexterityPower.atEndOfTurn (LoseDexterityPower.java:38-42) -- addToBot ApplyPowerAction(owner, DexterityPower(owner,-amount)) then RemoveSpecificPowerAction(owner, \"DexLoss\"); constructor type DEBUFF, POWER_ID \"DexLoss\" (:20,29). The exact mirror of LoseStrengthPower/Flex (id 13); native body queues APPLY_POWER Dexterity -amount + REMOVE_POWER LoseDexterity (both addToBot). Speed Potion's one-turn Dexterity."

- id: 16
  name: THORNS
  game_id: "Thorns"
  type: BUFF
  native: true
  hooks:
    on_attacked: []             # native: reflect `amount` THORNS damage to the attacker
  provenance: "ThornsPower.onAttacked (ThornsPower.java:45-52) -- if info.type != THORNS && != HP_LOSS && info.owner != null && info.owner != owner: addToTop DamageAction(info.owner, DamageInfo(owner, amount, THORNS)); returns damageAmount unchanged. Fires in AbstractPlayer.damage (:1425-1426) AFTER decrementBlock and REGARDLESS of whether the attack was blocked (no damageAmount>0 gate). Native body queues a THORNS-typed DAMAGE (add_to_top) to ctx.source (the attacker); THORNS type (interp.hpp) skips the NORMAL-only power modifiers so a Vulnerable attacker does NOT amplify it (VulnerablePower.atDamageReceive NORMAL-only, :66-72). POWER_ID \"Thorns\" (:22), default type BUFF (AbstractPower.java:67)."

- id: 17
  name: PLATED_ARMOR
  game_id: "Plated Armor"
  type: BUFF
  native: true
  hooks:
    at_end_of_turn_pre_card: [] # native: gain `amount` block (GainBlockAction, direct -- no Dexterity)
    was_hp_lost: []             # native: lose 1 stack on a real attack (not THORNS/HP_LOSS/self)
  provenance: "PlatedArmorPower.atEndOfTurnPreEndTurnCards (PlatedArmorPower.java:70-73) -- GainBlockAction(owner, amount), the §5.4 pre-card phase (same slot as Metallicize); wasHPLost (:54-59) -- if info.owner != null && info.owner != owner && type != HP_LOSS && type != THORNS && damage>0: addToBot ReducePowerAction(owner, \"Plated Armor\", 1). Native (both hooks): queues a kBlockNoPowers BLOCK(=amount) at pre-card; at wasHPLost decrements the slot by 1 (removes at 0) unless the loss was thorns/HP-loss/self. POWER_ID \"Plated Armor\" (:20)."

- id: 18
  name: REGEN
  game_id: "Regeneration"
  type: BUFF
  native: true
  hooks:
    at_end_of_turn: []          # native: heal `amount`, then decrement the stack (remove at 0)
  provenance: "RegenPower.atEndOfTurn (RegenPower.java:35-38) -- addToTop RegenAction(owner, amount); RegenAction.update (RegenAction.java:34-47) heals amount (heal() clamps to maxHP, only if currentHealth>0) THEN, for a player owner, --p.amount and remove at 0. The player variant \"Regeneration\" (RegenPotion applies this, not RegenerateMonsterPower). Native body heals the owner directly (no HEAL opcode; the Blood Potion / Burning Blood precedent) then decrements the Regen slot (player-only decrement per RegenAction). POWER_ID \"Regeneration\" (:16)."

- id: 19
  name: RITUAL
  game_id: "Ritual"
  type: BUFF
  native: true
  hooks:
    at_end_of_turn: []      # player/potion variant (onPlayer==true): +Strength=amount each end of turn
    at_end_of_round: []     # monster variant (Cultist, onPlayer==false): +Strength=amount each round AFTER the first (skipFirst)
  provenance: "RitualPower.atEndOfTurn (RitualPower.java:37-43) -- if isPlayer: addToBot ApplyPowerAction(owner, StrengthPower(owner, amount)); atEndOfRound (:45-55) -- if !onPlayer: skipFirst gate then addToBot ApplyPowerAction(owner, StrengthPower(owner, amount)). The two branches are the SAME power with opposite onPlayer, so made NATIVE (B3.13): the native body keys player-vs-monster on the OWNER actor (Cultist Potion applies to the PLAYER -> onPlayer==true -> at_end_of_turn; the Cultist monster applies to ITSELF -> onPlayer==false -> at_end_of_round with skipFirst). skipFirst per-instance state is the monster's kMonsterFlagRitualSkip flag bit (combat_state.hpp), set by the Cultist when it casts Incantation. Cultist Potion: RitualPower(player, potency, playerControlled=TRUE) (CultistPotion.java:54). Cultist monster: new RitualPower(this, ritualAmount, false) (Cultist.java:96,99). POWER_ID \"Ritual\" (:15)."

- id: 20
  name: CURL_UP
  game_id: "Curl Up"
  type: BUFF
  native: true
  hooks:
    on_attacked: []         # one-shot guard: first NORMAL, non-lethal, >0 attack -> gain `amount` Block, then self-remove
  provenance: "CurlUpPower.onAttacked (CurlUpPower.java:36-46) -- if !triggered && damageAmount < owner.currentHealth && damageAmount > 0 && info.owner != null && info.type == NORMAL: flash, set triggered=true SYNCHRONOUSLY, then addToBot ChangeStateAction(CLOSED), GainBlockAction(owner, owner, amount), and RemoveSpecificPowerAction(owner, owner, \"Curl Up\"). Native (guard + one-shot): op_damage dispatches onAttacked for NORMAL src!=tgt AFTER decrementBlock with post-block damage; the body re-checks amount>0 && amount<owner.hp, sets MonsterState.flags kMonsterFlagCurlUpTriggered before queueing kBlockNoPowers BLOCK and REMOVE_POWER. The explicit latch is required because queued multi-hit DAMAGE actions can resolve before the queued removal; removal clears the latch with the power instance. ChangeState CLOSED is presentation. POWER_ID \"Curl Up\" (:21)."
