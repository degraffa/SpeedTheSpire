# cards.yaml -- card registry (rules-as-data, design doc B §4.2).
#
# Entry shape (frozen, design doc B §4.2):
#   - id: <int>            numeric enum value -- append-only, NEVER renumbered
#     name: <SYMBOL>       generated enum symbol (CardId::<SYMBOL>)
#     game_id: "<string>"  the game's cardID string -- translator/oracle join key
#     color: RED|GREEN|BLUE|COLORLESS|CURSE
#     rarity: BASIC|COMMON|UNCOMMON|RARE|SPECIAL|CURSE
#     type: ATTACK|SKILL|POWER|STATUS|CURSE
#     cost: <int>          base energy cost
#     target: ENEMY|ALL_ENEMY|SELF|NONE|RANDOM_ENEMY|SELF_AND_ENEMY
#     flags: [ ... ]       exhaust | ethereal | innate | unplayable | retain | ...
#     provenance: "<Class.method (File.java:line) -- read in full>"
#     effects:             base effect program, stage-a §6 {op, target, amount, flags}
#       - {op: <OPCODE>, target: CARD_TARGET|SELF, amount: <int>[, power: <SYMBOL>]}
#     upgraded:            OPTIONAL full upgraded program (not a delta). Absent here:
#                          the skeleton deck is all base cards (stage-a design §9);
#                          codegen emits base rows only until CardDef gains the
#                          upgrade dimension (a later task).
#     native: <bool>       OPTIONAL; true -> named native branch (default false).
#
# Step target: SELF = the player; CARD_TARGET = the monster the card was played on
# (or the random roll). APPLY_POWER steps carry `power: <PowerId symbol>`; codegen
# packs its numeric PowerId into the step's `extra` field (make_apply_power_flags).
#
# Skeleton content (stage-a design §9). Ids pinned STRIKE=1..POMMEL_STRIKE=5 and
# re-asserted in the generated header (design doc B §4.4). Effect programs and base
# amounts mirror cards.hpp exactly (each use()'s addToBot order, base stats only;
# Strength/Vulnerable modifiers are applied by the DAMAGE pipeline at resolution,
# never baked here).

