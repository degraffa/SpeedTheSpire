- id: 25
  name: BURN
  game_id: "Burn"
  color: COLORLESS
  rarity: COMMON
  type: STATUS
  cost: -2
  target: NONE
  flags: []
  trigger: end_of_turn
  provenance: "Burn (Burn.java:29-33): cost -2 STATUS COLORLESS NONE; magicNumber 2 (baseMagic 2). triggerOnEndOfTurnForPlayingCard (Burn.java:53-56) sets dontTriggerOnUseCard and re-queues itself; use() with dontTriggerOnUseCard -> DamageAction(player, DamageInfo(player, magicNumber, THORNS)) (Burn.java:43-47). THORNS self-damage: reduced by block, NOT scaled by the player's own Strength/Vulnerable. upgrade() upgradeMagicNumber(2) -> 4 (Burn.java:64-71). Maps to trigger=end_of_turn + a self DAMAGE(THORNS) program (base 2 / upgraded 4)."
  effects:
    - {op: DAMAGE, target: SELF, amount: 2, damage_type: THORNS}
  upgraded:
    - {op: DAMAGE, target: SELF, amount: 4, damage_type: THORNS}

