# --- B3.9: remaining statuses (4) + curses (11) ------------------------------
# Design §5.1: 5 statuses (Wound landed id 24) + 11 curses (10 poolable + the
# A10+ starter Ascender's Bane). Unplayable (cost -2) -> UNPLAYABLE flag; the
# passive behaviors run their `effects` program at a trigger hook (end_of_turn /
# on_draw / on_other_card_played), NOT on play (they are unplayable). color/rarity
# are documentation-only (gen.py does not read them): CURSE cards are
# CardColor.CURSE / CardRarity.CURSE, statuses COLORLESS/COMMON per the Java ctor.

