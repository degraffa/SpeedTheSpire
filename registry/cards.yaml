# --- B3.4 red common skills (ids 6-10; skeleton already has Shrug It Off) -----
# CHOOSE-in-combat: a CHOOSE_CARD step opens the hand-select screen (interp.hpp);
# `choose` is the manipulation kind, `amount` the number to pick (auto-resolves
# when the selection is forced -- eligible <= amount -- or RANDOM). `target: SELF`
# is a player-side action (its actor is the player; it operates on the hand).

- id: 6
  name: ARMAMENTS
  game_id: "Armaments"
  color: RED
  rarity: COMMON
  type: SKILL
  cost: 1
  target: SELF
  flags: []
  provenance: "Armaments.use (Armaments.java:32-35) -> GainBlockAction(5), ArmamentsAction(upgraded). ArmamentsAction.update (ArmamentsAction.java:34-90): base upgrades ONE chosen upgradeable hand card (auto if exactly one, none if zero; handCardSelectScreen otherwise); upgraded (armamentsPlus) upgrades ALL upgradeable hand cards. baseBlock 5 (Armaments.java:28)."
  effects:
    - {op: BLOCK, target: SELF, amount: 5}
    - {op: CHOOSE_CARD, target: SELF, choose: upgrade, amount: 1}
  upgraded:
    - {op: BLOCK, target: SELF, amount: 5}
    # amount 99 >= hand size -> never blocks -> upgrade ALL upgradeable (armamentsPlus)
    - {op: CHOOSE_CARD, target: SELF, choose: upgrade, amount: 99}

