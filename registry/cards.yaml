# --- B3.3 red common attacks (ids 11-23; skeleton already has Pommel Strike) --
# Mechanically-loaded ops (Stage B B3.3, all read in full from cards/red):
#   DAMAGE_BLOCK      -- base == player block at execute (Body Slam).
#   DAMAGE_STR_MULT   -- `amount` base, Strength counted x `mult` (Heavy Blade).
#   DAMAGE_PER_STRIKE -- `amount` + `per`-per-"Strike"-card, baked at queue time,
#                        source card excluded (Perfected Strike).
#   MAKE_CARD         -- create `card` copies into `pile` (Anger self-copy to
#                        discard; Wild Strike Wound to a random draw-pile spot).
#   CHOOSE_CARD discard_to_draw_top -- Headbutt (discard -> top of draw).
# `strike: true` mirrors CardTags.STRIKE (Perfected Strike's count reads it);
# `requires_all_attacks: true` is Clash's canUse predicate. Neither is a
# per-instance flag, so the combat fixtures are untouched.

- id: 11
