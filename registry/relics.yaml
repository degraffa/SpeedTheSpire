# relics.yaml -- relic registry (rules-as-data, design doc B §4.2 / §5.3).
#
# Entry shape (frozen; B3.24 defines it following the powers.yaml hooks:/native:
# precedent from B3.2):
#   - id: <int>            numeric enum value -- append-only, NEVER renumbered
#     name: <SYMBOL>       generated enum symbol (RelicId::<SYMBOL>)
#     game_id: "<string>"  the game's relicId string (AbstractRelic ID) --
#                          translator/oracle join key
#     tier: STARTER|COMMON|UNCOMMON|RARE|BOSS|SHOP|SPECIAL|EVENT   (RelicTier)
#     native: <bool>       OPTIONAL; true -> the relic's hook bodies are handled by
#                          the native escape hatch (relic_hooks.cpp
#                          dispatch_native_relic_hook) rather than a data-bound
#                          effect program -- for counter/conditional/heal relics.
#                          A native relic still LISTS the hooks it responds to (with
#                          an empty program) so the framework routes them.
#     hooks:               OPTIONAL; RelicHook -> effect program (reusing the
#                          CardEffectStep shape). Each key is a RelicHook name
#                          (relic_hooks.hpp); the value is a list of
#                          {op, target, amount[, power]} steps queued (addToBot) in
#                          list order when the hook fires, resolved relative to the
#                          player (SELF == the player; ALL_ENEMY/RANDOM_ENEMY fan
#                          out over the player's enemies at execute time). Unlike
#                          powers, a relic step's amount is ALWAYS a literal (relics
#                          carry no stack amount).
#     provenance: "<Class.method (File.java:line) -- read in full>"
#
# SCOPE (B3.24): Burning Blood (Ironclad starter) + the Ironclad-obtainable COMMON
# pool. Enumerated from RelicLibrary.initialize() (RelicLibrary.java:231-368 shared
# `add()` + :382 `addRed()`), filtered to RelicTier.COMMON per-file. EXCLUDED as
# NOT Ironclad-obtainable: Damaru (addPurple/Watcher), DataDisk (addBlue/Defect),
# SneckoSkull (addGreen/Silent), Test5 (unused). RedSkull is the only RED common.
# Uncommon/rare/boss/shop/special tiers land with B3.25-B3.27.
#
# Trigger dispatch fires relics in ACQUISITION ORDER (design doc §4.3 / stage-a
# trap 8): the framework iterates the relic list index 0..count-1 at each hook site
# (relic_hooks.cpp). Combat storage of the relic list on CombatState is a B4.3
# additive-field concern (schema owner); until it lands the dispatch sites in
# power_hooks.cpp/action_queue.cpp are wired but read an empty relic view (no-op),
# and the acquisition-order + per-relic behaviour is proven by relic_hooks_test.cpp
# constructing relic lists directly.

# --- Starter --------------------------------------------------------------------

- id: 1
  name: BURNING_BLOOD
  game_id: "Burning Blood"
  tier: STARTER
  native: true
  hooks:
    on_victory: []            # heal 6 HP at combat end (native; clamps to max HP)
  provenance: "BurningBlood.onVictory (BurningBlood.java:30-33) -- addToTop RelicAboveCreatureAction then heals 6 (anonymous action); ID (BurningBlood.java) 'Burning Blood'"

