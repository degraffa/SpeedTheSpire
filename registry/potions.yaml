# potions.yaml -- potion registry (rules-as-data, design doc B §4.2, §5.4; task B3.23).
#
# The 33 Ironclad-obtainable potions: PotionHelper.getPotions(IRONCLAD, false)
# (PotionHelper.java:88-162) = the 3 Ironclad-specific (BloodPotion, Elixir,
# HeartOfIron) + the 30 shared potions. The class-specific potions of the other
# three characters (Poison/Cunning/GhostInAJar = Silent; Focus/PotionOfCapacity/
# EssenceOfDarkness = Defect; BottledMiracle/Stance/Ambrosia = Watcher) are NOT
# in the Ironclad pool and are out of S1 scope. Sacred Bark (potency-doubling) is
# S2 (design §5.4) and not modeled here.
#
# Entry shape (frozen; extends the §4.2 shape, mirrors powers.yaml's precedent):
#   - id: <int>            PotionId enum value -- append-only, NEVER renumbered.
#                          Ordered to match the Ironclad pool list order
#                          (getPotions), so the identity-roll pool index maps 1:1.
#     name: <SYMBOL>       generated enum symbol (PotionId::<SYMBOL>).
#     game_id: "<string>"  the game's AbstractPotion.ID (POTION_ID) -- translator
#                          join key; identical to the PotionHelper pool key.
#     rarity: COMMON|UNCOMMON|RARE   AbstractPotion.PotionRarity (tier gate 65/25/10).
#     potency: <int>       getPotency(ascensionLevel) -- ascension-INDEPENDENT for
#                          every Ironclad potion (each override returns a constant),
#                          so potency@A20 == this value.
#     provenance: "<Class.method (File.java:line) -- read in full>"
#     effects:             OPTIONAL USE effect program (the CardEffectStep shape:
#                          {op, target, amount[, power]}). The step `amount` is the
#                          potion's potency. Absent -> native.
#     native: <bool>       OPTIONAL; true -> the USE body is a named native branch
#                          (potions.cpp dispatch_native_potion). Default false.
#
# EFFECT PROGRAMS vs NATIVE (B3.2 convention). A potion is a DATA effect program
# only where the frozen opcode set (interp.hpp) AND an already-registered power
# suffice. The registered powers today (powers.yaml, owned by B3.4) are Strength,
# Vulnerable, Weak, Artifact, Metallicize (+ the B3.2 framework powers). Potions
# that grant powers NOT yet in the registry (Dexterity, Regen, Thorns, Plated
# Armor, Ritual, StrengthDown/LoseDexterity, a Duplication/Double-Tap power), or
# that need verbs owned by other tasks (in-combat card CHOOSE = B3.4; recursive
# play = a later opcode; run-layer max-HP / potion-slot mutation = B4.x; combat
# escape = B3.15; out-of-combat revive), are `native: true` with the body
# DEFERRED to when that dependency lands (see the B3.23 Log). They still carry
# their real potency/rarity/game_id here so the registry, translator join, and
# identity roll are complete now.

# --- Ironclad-specific (PotionHelper.java:92-96) ----------------------------

- id: 1
  name: BLOOD_POTION
  game_id: "BloodPotion"
  rarity: COMMON
  potency: 20
  # Heal floor(maxHealth * potency/100). No HEAL opcode -> native (combat-
  # expressible: writes player_hp, clamped to max). potency = heal PERCENT.
  native: true
  provenance: "BloodPotion.use (BloodPotion.java:43), getPotency (:60) -- HealAction maxHealth*potency/100 float floor"

