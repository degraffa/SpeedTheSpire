    - name: CURL_UP
      stream: MONSTER_HP
      timing: PRE_BATTLE
      range:
        base: {min: 3, max: 7}  # LouseDefensive.java:74 (ascension < 7)
        a7:   {min: 4, max: 8}  # LouseDefensive.java:71-72 (ascension 7..16)
        a17:  {min: 9, max: 12} # LouseDefensive.java:69-70 (ascension >= 17)
  moves:
    - name: BITE
      move_id: 3               # LouseDefensive.java:44
      intent: ATTACK
      effects:
