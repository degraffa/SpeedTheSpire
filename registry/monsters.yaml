# --- B3.17: large slimes + split framework ------------------------------------
# Both classes read in full. Constructors consume exactly one monsterHpRng draw
# (setHp) and add SplitPower (amount -1, display-only marker; SplitPower.java:
# 19-26); AbstractMonster.init consumes the first aiRng random(99) draw. The
# SPLIT move (byte 3) has NO data program: its takeTurn body is runtime-dependent
# (CannotLose -> Suicide(no relics) -> 2x SpawnMonsterAction(medium slime at the
# parent's CURRENT hp) -> CanLose; AcidSlime_L.java:127-138 / SpikeSlime_L.java:
# 114-125), queued natively by monster_slime_large.cpp -- the NOP placeholder
# below only records the move id + UNKNOWN intent telegraph (the Louse rolled-
# bite amount-0 precedent). The damage() interrupt (<= half max HP -> re-
# telegraph SPLIT + queued SetMoveAction, splitTriggered latch) is native too
# (AcidSlime_L.java:142-152 / SpikeSlime_L.java:130-140).

