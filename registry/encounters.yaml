# encounters.yaml -- encounter registry (rules-as-data, design doc B §4.2, §5.2).
#
# An encounter is a monster-group definition (the actors that spawn together for a
# combat). B3.12 generalizes this domain from an empty stub into the Act-1
# (Exordium) encounter FRAMEWORK: the monsterRng pool tables + weights + exclusions
# that build a run's monster list, and the miscRng COMPOSITION PROGRAMS that turn an
# encounter key into a concrete spawn order. The per-monster stats/AI land in
# B3.13-B3.22 (monsters.yaml); this domain is the spawn scaffolding.
#
# Entry shape (frozen at B3.12):
#   - id: <int>            numeric id -- append-only, NEVER renumbered. Within a
#                          (act,pool) group, id order == the game's ArrayList add()
#                          order, so the engine's stable-sort-by-weight roll
#                          (MonsterInfo.normalizeWeights, TRAP 1) reproduces the
#                          game's tie order.
#     name: <SYMBOL>       symbolic name (documentation; this domain emits no enum)
#     game_id: "<string>"  the game's encounter/monster-group KEY (Exordium pool
#                          string == MonsterHelper.getEncounter key) -- join key.
#     act: <int>           1 (Exordium) for every B3.12 entry.
#     pool: WEAK|STRONG|ELITE|BOSS   which generateXxx list it belongs to.
#     weight: <float>      MonsterInfo weight (pool-roll band width). BOSS = 0.0
#                          (bosses are shuffled, not weight-rolled).
#     excludes: [<game_id>, ...]   WEAK only, optional: strong-pool keys forbidden
#                          as the FIRST strong enemy when THIS is the 3rd weak
#                          monster (Exordium.generateExclusions, keyed on
#                          monsterList.last()). Absent == no exclusions.
#     program: [ <node>, ... ]     the miscRng COMPOSITION PROGRAM: an ordered list
#                          of spawn nodes (spawn order == turn order). Nodes:
#             {emit: "<MonsterGameId>"}                 -- one fixed monster, 0 draws
#             {bool: {if_true: "<G>", if_false: "<G>"}} -- 1 randomBoolean(); the
#                          getLouse/getSlaver/Large-Slime coin flip (true->if_true).
#             {seq_bool: {if_true: [<G>...], if_false: [<G>...]}} -- 1 randomBoolean()
#                          selecting a whole SEQUENCE (spawnSmallSlimes).
#             {pick: [ <choice>, ... ]}                 -- EAGER-construct every
#                          choice in order (a {bool:...} choice DRAWS its coin now,
#                          during list build -- MonsterHelper builds the ArrayList
#                          before selecting), THEN one random(0,n-1) selects which
#                          constructed monster to keep. A choice is {emit:"<G>"} or
#                          {bool:{...}}. (bottomGetWeakWildlife/StrongHumanoid/
#                          StrongWildlife.)
#             {pool: {members: [<G>...], count: <n>}}   -- draw-WITHOUT-replacement:
#                          n times draw random(remaining-1), pop, emit (spawnGremlins,
#                          spawnManySmallSlimes).
#          Monster game_ids are the game's AbstractMonster.ID strings (verified from
#          the decompiled sources) -- the join keys to monsters.yaml as those
#          monsters land in later batches.
#     provenance: "<Class.method (File.java:line) -- read in full>"
#
# This domain emits no id enum (encounters are groupings, not content ids); codegen
# emits the pool/composition tables (encounter_table.hpp) and reports the row count
# in the manifest. Empty-in-skeleton is over (stage-a §9); the framework is now live.
#
# Provenance base (all read in full from D:\STS_BG_Mod\SlayTheSpireDecompiled):
#   Exordium.generateMonsters/generateWeak/Strong/Elites/generateExclusions/
#   initializeBoss (Exordium.java:110-221); MonsterInfo.normalizeWeights/roll/
#   compareTo (MonsterInfo.java:27-52, stable ascending-weight sort BEFORE rolling,
#   TRAP 1); AbstractDungeon.populateMonsterList/populateFirstStrongEnemy
#   (AbstractDungeon.java:1057-1096); MonsterHelper.getEncounter + spawn helpers
#   (MonsterHelper.java:389-836).

